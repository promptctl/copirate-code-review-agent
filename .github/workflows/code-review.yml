name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

# A push during an in-flight review supersedes it: cancel the stale round rather than
# let it burn the full diff's token cost reviewing an already-replaced commit. Scoped
# per-PR so concurrent PRs never cancel each other.
concurrency:
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Code Review
        id: review
        uses: ./
        with:
          # Dogfood the SHIPPED default. With no .github/review-agents.yml committed, the
          # action runs in simple mode and PROVIDER=auto (action.yml's default) resolves to
          # DeepSeek — exactly the engine an unconfigured consumer gets. The repo reviews its
          # own PRs with its own default, so every PR is live coverage of the real default path.
          PROVIDER: auto
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZAI_REVIEWER_NAME: ${{ vars.ZAI_REVIEWER_NAME }}
          # dist/** is committed BUNDLED output (ncc): every feature PR changes it, and reviewing
          # the 1.5 MB bundle in full costs ~700K input tokens for zero signal — CI already verifies
          # dist matches a fresh build of src/. Exclude it so no worker reads generated output.
          # EXCLUDE_PATTERNS REPLACES the default (it does not append), so the lock-file patterns are
          # copied from action.yml's EXCLUDE_PATTERNS default — keep them in sync if that default changes.
          EXCLUDE_PATTERNS: "dist/**,*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"

      # Archive the full session transcript (prompt + raw engine output incl. thinking/tool
      # calls + stderr) on every run, success or failure. if: always() guarantees it is captured
      # even when the review step fails; if-no-files-found: ignore tolerates a run that spawned
      # no engine (e.g. a fork-PR skip), where the directory is legitimately empty.
      - name: Archive review transcript
        if: always() && steps.review.outputs.transcript-dir != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: review-session-transcript
          path: ${{ steps.review.outputs.transcript-dir }}
          if-no-files-found: ignore
