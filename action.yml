name: "CoPirate Code Review"
description: "Runs a coding agent as a read-only PR or whole-repo code reviewer."
inputs:
  MODE:
    description: "Review material: a pull request diff or the whole repo."
    required: false
    default: "pr"
  SCOPE:
    description: "Free-text focus for the whole-repo review."
    required: false
    default: ""
  CONFIG_FILE:
    description: "Path to the review-agents config file."
    required: false
    default: ".github/review-agents.yml"
  CONFIG:
    description: "Named config to select from the config file."
    required: false
  PROVIDER:
    description: "auto|deepseek|codex|zai (default: auto)"
    required: false
    default: "auto"
  OPENAI_API_KEY:
    description: "OpenAI API key for the codex provider."
    required: false
  OPENAI_MODEL:
    description: "Model for the codex provider."
    required: false
    default: "gpt-5.4-mini"
  OPENAI_REASONING_EFFORT:
    description: "Reasoning effort for the codex provider."
    required: false
  OPENAI_BASE_URL:
    description: "Base URL for the codex provider's endpoint."
    required: false
    default: "https://api.openai.com/v1"
  ZAI_API_KEY:
    description: "Z.ai API key for the zai provider."
    required: false
  ZAI_MODEL:
    description: "Model for the zai provider."
    required: false
    default: "glm-5.1"
  ZAI_BASE_URL:
    description: "Base URL for the zai provider's endpoint."
    required: false
    default: "https://api.z.ai/api/anthropic"
  ZAI_SYSTEM_PROMPT:
    description: "Optional extra system prompt appended for the reviewer. Empty by default — the built-in review charter already carries the whole review standard."
    required: false
    default: ""
  DEEPSEEK_API_KEY:
    description: "DeepSeek API key for the deepseek provider."
    required: false
  DEEPSEEK_MODEL:
    description: "Model for the deepseek provider."
    required: false
    default: "deepseek-v4-pro"
  DEEPSEEK_BASE_URL:
    description: "Base URL for the deepseek provider's endpoint."
    required: false
    default: "https://api.deepseek.com/anthropic"
  ZAI_REVIEWER_NAME:
    description: "Name shown in the review comment header."
    required: false
    default: "CoPirate Code Review"
  EXCLUDE_PATTERNS:
    description: "Comma-separated file patterns to exclude from review."
    required: false
    default: "*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"
  MAX_DIFF_CHARS:
    description: "Max characters of diff sent to the API (0 = unlimited)."
    required: false
    default: "0"
  GITHUB_TOKEN:
    description: "GitHub token for API access."
    required: false
    default: ${{ github.token }}
  GITHUB_REVIEW_TOKEN:
    description: "Token for all GitHub API calls; enables submitting approvals."
    required: false
  PR_NUMBER:
    description: "Pull request number to review."
    required: false
  HEAD_SHA:
    description: "Head commit SHA the review is anchored to."
    required: false
outputs:
  transcript-dir:
    description: "Directory holding the full session transcript file(s) — the exact prompt, raw engine output (incl. thinking/tool calls), and stderr for every engine attempt. Always produced; point actions/upload-artifact at it to archive the session on every run."
runs:
  using: "node24"
  main: "dist/index.js"
branding:
  icon: "check-circle"
  color: "gray-dark"
