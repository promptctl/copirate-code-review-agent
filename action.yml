name: "Z.ai Coding Agent Review"
description: "AI-powered code review. Defaults to the Codex/OpenAI engine; the provider is selected explicitly via PROVIDER, never inferred from which credential is set."
inputs:
  MODE:
    description: "Review material: 'pr' (default — review a pull request diff and post an inline review) or 'repo' (on-demand whole-repo review, typically via workflow_dispatch, that prints a findings report to the Step Summary and needs no PR)."
    required: false
    default: "pr"
  SCOPE:
    description: "Optional free-text focus for MODE=repo, injected into the review prompt (e.g. 'the auth layer', 'error handling across services'). Empty means a broad whole-repo review. Ignored when MODE=pr."
    required: false
    default: ""
  CONFIG_FILE:
    description: "Path to the review-agents config file (default: .github/review-agents.yml). When this file exists it owns engine selection and the simple-mode PROVIDER/key inputs are ignored."
    required: false
    default: ".github/review-agents.yml"
  CONFIG:
    description: "Select a named config from the config file. Overrides the file's 'default' field."
    required: false
  PROVIDER:
    description: "Which engine to run in simple mode (no CONFIG_FILE): 'codex' (OpenAI Responses, default), 'zai' (Claude Code against Z.ai), 'deepseek' (Claude Code against DeepSeek's Anthropic endpoint), or 'auto' (forwards to whichever provider the action currently points 'auto' at — DeepSeek today — so you can pin PROVIDER: auto and be retargeted centrally). The provider is chosen by this value alone — setting a credential does not switch it."
    required: false
    default: "codex"
  OPENAI_API_KEY:
    description: "OpenAI API key. Required when PROVIDER is 'codex' (the default)."
    required: false
  OPENAI_MODEL:
    description: "Model for the 'codex' provider."
    required: false
    default: "gpt-5.4-mini"
  OPENAI_REASONING_EFFORT:
    description: "Reasoning effort for the 'codex' provider: minimal, low, medium, high, or xhigh. Omit for the model default."
    required: false
  OPENAI_BASE_URL:
    description: "Base URL for the 'codex' provider's OpenAI-Responses-compatible endpoint (e.g. Azure OpenAI or a gateway)."
    required: false
    default: "https://api.openai.com/v1"
  ZAI_API_KEY:
    description: "Z.ai API key. Required when PROVIDER is 'zai'. Setting it does not by itself select the Z.ai engine."
    required: false
  ZAI_MODEL:
    description: "Model for the 'zai' provider (Claude Code)."
    required: false
    default: "glm-5.1"
  ZAI_BASE_URL:
    description: "Base URL for the 'zai' provider's Anthropic-compatible endpoint."
    required: false
    default: "https://api.z.ai/api/anthropic"
  ZAI_SYSTEM_PROMPT:
    description: "Additional system prompt appended to Claude Code"
    required: false
    default: "Review according to the LAWS. Request changes for blocking issues: LAW VIOLATIONS, bugs, security flaws, invariant/type violations, rough data/control flow, duplicate truth/enforcement, dependency cycles, temporal coupling, or missing behavior tests."
  DEEPSEEK_API_KEY:
    description: "DeepSeek API key. Required when PROVIDER is 'deepseek' (or 'auto', which resolves to deepseek). Setting it does not by itself select the provider."
    required: false
  DEEPSEEK_MODEL:
    description: "Model for the 'deepseek' provider (Claude Code against DeepSeek)."
    required: false
    default: "deepseek-v4-pro"
  DEEPSEEK_BASE_URL:
    description: "Base URL for the 'deepseek' provider's Anthropic-compatible endpoint."
    required: false
    default: "https://api.deepseek.com/anthropic"
  ZAI_REVIEWER_NAME:
    description: "Name shown in the review comment header"
    required: false
    default: "Z.ai Coding Agent Review"
  EXCLUDE_PATTERNS:
    description: "Comma-separated file patterns to exclude from review (e.g. '*.lock,dist/**,*.min.js')"
    required: false
    default: "*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"
  MAX_DIFF_CHARS:
    description: "Maximum total characters for the diff sent to the API (0 = unlimited)"
    required: false
    default: "0"
  GITHUB_TOKEN:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
  GITHUB_REVIEW_TOKEN:
    description: "Optional token to set when you want the agent to submit PRs with no requested changes as approvals.  If this is set, it will be used for all GitHub API requests."
    required: false
  PR_NUMBER:
    description: "Pull request number to review. Auto-detected on pull_request events; pass explicitly on other events (e.g. workflow_run) where there is no pull_request payload."
    required: false
  HEAD_SHA:
    description: "Head commit SHA the review is anchored to. Auto-detected on pull_request events; pass explicitly on other events (e.g. workflow_run)."
    required: false
runs:
  using: "node24"
  main: "dist/index.js"
branding:
  icon: "check-circle"
  color: "gray-dark"
